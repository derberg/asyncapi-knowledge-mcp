name: Publish asyncapi-knowledge-mcp to PyPI

# Builds the knowledge base into a standalone MCP package (opencrane pack)
# and publishes it via PyPI trusted publishing (OIDC) — no token secrets.
# One-time setup on pypi.org: add a trusted publisher for project
# "asyncapi-knowledge-mcp" → repo derberg/asyncapi-knowledge-mcp, workflow
# publish-pypi.yml (no GitHub environment).

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  OPENCRANE_VERSION: 0.18.7

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # embeddings.json + milvus.db are LFS-tracked committed artifacts,
          # kept current by refresh.yml (regenerated only when chunks change).
          # No re-embedding here — pack uses the committed vectors as-is.
          lfs: true
          persist-credentials: false

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.8.19"
          # No cache in the release workflow — a poisoned cache entry could end
          # up inside the published PyPI artefact (zizmor: cache-poisoning).
          enable-cache: false

      # The version comes from the GitHub release tag, as-is with a leading
      # "v" stripped (e.g. a release tagged "v2026.6.7" publishes 2026.6.7).
      - name: Pack the MCP package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Packing asyncapi-knowledge-mcp version $VERSION"
          uvx "opencrane@${OPENCRANE_VERSION}" pack --name asyncapi-knowledge-mcp --version "$VERSION" --output .opencrane/pack

      - name: Build wheel + sdist
        # opencrane pack scaffolds the source tree; `build` produces the
        # dist/ artefacts that pypi-publish consumes.
        run: |
          uv pip install --system build==1.2.2
          python -m build .opencrane/pack --outdir .opencrane/pack/dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: .opencrane/pack/dist

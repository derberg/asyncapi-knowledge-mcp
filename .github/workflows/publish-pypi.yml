name: Publish asyncapi-knowledge-mcp to PyPI

# Builds the knowledge base into a standalone MCP package (opencrane pack)
# and publishes it via PyPI trusted publishing (OIDC) — no token secrets.
# One-time setup on pypi.org: add a trusted publisher for project
# "asyncapi-knowledge-mcp" → repo derberg/asyncapi-knowledge-mcp, workflow
# publish-pypi.yml (no GitHub environment).

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  OPENCRANE_VERSION: 0.18.8

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # embeddings.json + chunks.json are LFS-tracked committed artifacts,
          # kept current by refresh.yml. No re-embedding here (no model); the
          # Milvus index is rebuilt from the committed embeddings in the step
          # below so the packaged milvus.db always matches the committed chunks.
          lfs: true
          persist-credentials: false

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.8.19"
          # No cache in the release workflow — a poisoned cache entry could end
          # up inside the published PyPI artefact (zizmor: cache-poisoning).
          enable-cache: false

      - name: Rebuild the vector index from committed chunks + embeddings
        # pack ships .opencrane/milvus.db. Regenerate it here — cheap, no model,
        # just loads the committed embeddings.json — so the packaged index can
        # never lag chunks.json (e.g. after a manual content edit).
        run: uvx "opencrane@${OPENCRANE_VERSION}" index

      # The version comes from the GitHub release tag, as-is with a leading
      # "v" stripped (e.g. a release tagged "v2026.6.7" publishes 2026.6.7).
      - name: Pack the MCP package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Packing asyncapi-knowledge-mcp version $VERSION"
          uvx "opencrane@${OPENCRANE_VERSION}" pack --name asyncapi-knowledge-mcp --version "$VERSION" --output .opencrane/pack

      - name: Build wheel + sdist
        # opencrane pack scaffolds the source tree; `uv build` produces the
        # dist/ artefacts that pypi-publish consumes. Use uv's isolated build
        # (PEP 517) rather than `pip install --system build`, which fails on the
        # runner's externally-managed /usr Python (PEP 668).
        run: uv build .opencrane/pack --out-dir .opencrane/pack/dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: .opencrane/pack/dist

  # After a successful publish, bump the asyncapi-knowledge-mcp==X.Y.Z pin in
  # every location (chat snippets, README, plugin .mcp.json, Space Dockerfile)
  # and push the updated Dockerfile to the Space. Pinning policy: no implicit
  # "latest", anywhere — so every release must propagate its version
  # deliberately, and a factory rebuild alone would just reinstall the OLD
  # pinned version. Uploading the re-pinned Dockerfile triggers the rebuild.
  bump-pins:
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main # the bump lands on main, not on the tag

      - name: Bump the package pin everywhere
        run: node scripts/bump-package-pin.mjs "${GITHUB_REF_NAME#v}"

      - name: Commit the bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chat/index.html README.md plugins/ space/
          if git diff --cached --quiet; then
            echo "Pins already at ${GITHUB_REF_NAME#v} — nothing to commit."
          else
            git commit -m "chore: bump asyncapi-knowledge-mcp pin to ${GITHUB_REF_NAME#v}"
            git push origin main
          fi

      - name: Push the updated Dockerfile to the Hugging Face Space
        # Skips gracefully until HF_TOKEN (a write-scoped HF access token) is
        # added as a repo secret.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: derberg/asyncapi-knowledge-mcp
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::warning::HF_TOKEN secret not set — Space NOT updated; it still serves the previous release. Push space/ manually with 'hf upload'."
            exit 0
          fi
          pipx install "huggingface_hub[cli]==0.36.0"
          hf upload "$HF_SPACE" space/ . --repo-type space \
            --commit-message "Bump asyncapi-knowledge-mcp pin to ${GITHUB_REF_NAME#v}"

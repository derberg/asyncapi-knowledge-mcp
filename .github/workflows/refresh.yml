name: Weekly knowledge refresh

on:
  schedule:
    - cron: "0 3 * * 6"   # Saturdays 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

env:
  OPENCRANE_VERSION: 0.18.8

jobs:
  refresh:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.8.19"

      - name: Install dependencies
        run: npm ci

      - name: Download the AsyncAPI JSON Schema
        run: node scripts/download-schema.mjs

      - name: Build the AsyncAPI use cases source
        run: node scripts/build-usecases.mjs

      - name: Re-fetch sources
        env:
          GITHUB_TOKEN: ${{ github.token }}   # opencrane fetch needs a non-empty token
        run: uvx "opencrane@${OPENCRANE_VERSION}" fetch

      - name: Restore docs_url stripped by fetch
        # `opencrane fetch` rewrites config.yaml and drops docs_url from fetched
        # sources, which would make `llms` emit github.com/.../blob/main links on
        # the wrong branch. Re-apply it before generating llms/chunks.
        run: node scripts/restore-docs-url.mjs

      - name: Regenerate committed inputs
        run: |
          uvx "opencrane@${OPENCRANE_VERSION}" llms
          uvx "opencrane@${OPENCRANE_VERSION}" chunk

      - name: Check whether chunks actually changed
        id: chunks
        # Embeddings depend only on chunks.json — if it is byte-identical after
        # the re-fetch, skip the (slow) embedding regeneration entirely.
        run: |
          if ! git diff --quiet -- .opencrane/chunks.json; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "chunks.json unchanged — skipping embedding regeneration."
          fi

      - name: Regenerate embeddings + vector index (only when chunks changed)
        if: steps.chunks.outputs.changed == 'true'
        # Uses opencrane's LOCAL embedding model — no API keys needed. The
        # artifacts feed the PyPI package and the Hugging Face Space (the
        # search backends); nothing on Vercel consumes vectors anymore.
        run: |
          # The checkout skips LFS on purpose (no bandwidth burn) so milvus.db
          # in the working tree is a 134-byte LFS POINTER file. Milvus Lite
          # tries to OPEN it ("file is not a database") instead of creating a
          # fresh one — remove it first; `opencrane index` recreates it.
          rm -f .opencrane/milvus.db .opencrane/embeddings.json
          uvx "opencrane@${OPENCRANE_VERSION}" embed
          uvx "opencrane@${OPENCRANE_VERSION}" index

      - name: Commit refreshed inputs if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # embeddings.json / milvus.db are LFS-tracked (see .gitattributes) —
          # git lfs must be active for the clean filter.
          git lfs install --local
          # Committed inputs: opencrane outputs (incl. fetched sources and the
          # locally-mirrored schema under .opencrane/sources) + LFS artifacts.
          git add .opencrane/sources .opencrane/chunks.json .opencrane/llmstxt \
                  .opencrane/embeddings.json .opencrane/milvus.db
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No content changes this week."
          else
            git commit -m "chore: weekly content refresh ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

# Vercel auto-deploys on every push to main — the commit above is sufficient to
# ship the refreshed content. NO explicit deploy step needed here.
#
# Releases gate the PyPI publish only (publish-pypi.yml).

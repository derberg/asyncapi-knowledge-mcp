rules:
  artipacked:
    # These workflows intentionally persist checkout credentials because they
    # commit back to main with `git push` (contents: write):
    # - refresh.yml: weekly regenerated knowledge-base artifacts
    # - publish-pypi.yml: the bump-pins job propagates the released version
    #   into every pinned location (publish job sets persist-credentials: false)
    # All other checkouts set persist-credentials: false.
    ignore:
      - refresh.yml
      - publish-pypi.yml
